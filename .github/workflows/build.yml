name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $version = Get-Date -Format "yyyy.MM.dd.HHmm"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build binaries
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          foreach ($rid in @("win-x64", "win-arm64")) {
            Write-Host "Publishing for $rid..."
            dotnet publish src/installer/installer.csproj `
              -c Release -r $rid --self-contained `
              -p:PublishSingleFile=true `
              -p:PublishTrimmed=true `
              -p:TrimMode=partial `
              -p:EnableCompressionInSingleFile=true `
              -p:Version=$version

            $arch = if ($rid -eq "win-x64") { "x64" } else { "arm64" }
            New-Item -ItemType Directory -Path "dist/$arch" -Force | Out-Null
            Copy-Item "src/installer/bin/Release/net10.0/$rid/publish/installer.exe" "dist/$arch/installer.exe" -Force
            Write-Host "Built: dist/$arch/installer.exe"
          }

      - name: Test executable
        shell: pwsh
        run: .\dist\x64\installer.exe --version

      - name: Prepare release binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          foreach ($arch in @("x64", "arm64")) {
            Compress-Archive -Path "dist/$arch/installer.exe" -DestinationPath "release/installer-$arch.zip" -Force
            Write-Host "Created: release/installer-$arch.zip"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: installer ${{ needs.build.outputs.version }}
          generate_release_notes: true
          files: release/*

      - name: Delete tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/v${{ needs.build.outputs.version }}" || true
